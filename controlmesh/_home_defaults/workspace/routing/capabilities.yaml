agent_slots:
  foreground_controller:
    runtime: controlmesh_foreground
    provider: gpt
    model: gpt-5.4
    mode: foreground
    role: controller
    canonical_write: true
    capabilities:
      planning:
        score: 0.92
      routing:
        score: 0.92
      synthesis:
        score: 0.9
      final_judgment:
        score: 0.9

  background_worker:
