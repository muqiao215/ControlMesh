name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  UV_VERSION: "0.11.7"
  BUN_VERSION: "1.3.11"

jobs:
  verify-release-readiness:
    name: Verify tagged commit passed main CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_match = re.search(r'^version = "([^"]+)"', pyproject, re.MULTILINE)
          if not project_match:
              raise SystemExit("Failed to read version from pyproject.toml")
          project_version = project_match.group(1)
          expected_tag = f"v{project_version}"
          actual_tag = "${{ github.ref_name }}"
          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Tag/version mismatch: ref={actual_tag} but pyproject.toml={project_version}"
              )
          print(f"Tag/version OK: {actual_tag}")
          PY
      - name: Verify tagged commit is on origin/main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit $GITHUB_SHA is not reachable from origin/main."
            exit 1
          fi
      - name: Wait for main CI success on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repository = os.environ["REPOSITORY"]
          head_sha = os.environ["HEAD_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          attempts = 40
          delay_seconds = 15

          owner, repo = repository.split("/", 1)
          query = urllib.parse.urlencode(
              {
                  "head_sha": head_sha,
                  "event": "push",
                  "per_page": 20,
              }
          )
          url = (
              f"https://api.github.com/repos/{owner}/{repo}/actions/workflows/ci.yml/runs?{query}"
          )
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          for attempt in range(1, attempts + 1):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              runs = payload.get("workflow_runs", [])
              if runs:
                  run = max(runs, key=lambda item: item.get("run_number", 0))
                  status = run.get("status") or ""
                  conclusion = run.get("conclusion") or ""
                  html_url = run.get("html_url") or ""
                  print(
                      f"Attempt {attempt}/{attempts}: CI status={status} "
                      f"conclusion={conclusion or '<pending>'} url={html_url}"
                  )
                  if status == "completed":
                      if conclusion == "success":
                          print(f"Main CI succeeded for commit {head_sha}")
                          raise SystemExit(0)
                      raise SystemExit(
                          f"Main CI did not succeed for commit {head_sha}: {conclusion}"
                      )
              else:
                  print(f"Attempt {attempt}/{attempts}: no CI run found yet for {head_sha}")
              time.sleep(delay_seconds)

          raise SystemExit(f"Timed out waiting for main CI success on commit {head_sha}")
          PY

  build:
    name: Build distribution
    needs: verify-release-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Toolchain doctor
        run: python scripts/doctor_toolchain.py --strict --require-bun
      - name: Install build environment
        run: uv sync --all-extras --dev
      - name: Verify version consistency
        run: |
          python - <<'PY'
          import pathlib, re, sys
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          init_py = pathlib.Path("controlmesh/__init__.py").read_text(encoding="utf-8")
          project_match = re.search(r'^version = "([^"]+)"', pyproject, re.MULTILINE)
          init_match = re.search(r'^__version__ = "([^"]+)"', init_py, re.MULTILINE)
          if not project_match or not init_match:
              raise SystemExit("Failed to read version from pyproject.toml or controlmesh/__init__.py")
          project_version = project_match.group(1)
          init_version = init_match.group(1)
          if project_version != init_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={project_version} vs controlmesh/__init__.py={init_version}"
              )
          print(f"Version OK: {project_version}")
          PY
      - name: Build package
        run: uv build
      - name: Verify dist contents
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          project_version = next(
              line.split("=", 1)[1].strip().strip('"')
              for line in pyproject.splitlines()
              if line.startswith("version = ")
          )
          wheel = dist / f"controlmesh-{project_version}-py3-none-any.whl"
          sdist = dist / f"controlmesh-{project_version}.tar.gz"

          if not wheel.exists() or not sdist.exists():
              raise SystemExit(f"Missing expected dist files: wheel={wheel.exists()} sdist={sdist.exists()}")

          with zipfile.ZipFile(wheel) as zf:
              wheel_hits = [name for name in zf.namelist() if name.startswith("controlmesh_runtime/")]
          with tarfile.open(sdist) as tf:
              sdist_hits = [name for name in tf.getnames() if "controlmesh_runtime/" in name]

          if not wheel_hits or not sdist_hits:
              raise SystemExit(
                  "Built distributions are missing controlmesh_runtime. "
                  f"wheel_hits={len(wheel_hits)} sdist_hits={len(sdist_hits)}"
              )

          print(
              "Dist contents verified: "
              f"wheel_hits={len(wheel_hits)} sdist_hits={len(sdist_hits)}"
          )
          PY
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi:
    name: Verify PyPI visibility
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Wait for PyPI JSON to show the tagged version
        run: |
          python - <<'PY'
          import json
          import pathlib
          import time
          import urllib.error
          import urllib.request

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_name = next(
              line.split("=", 1)[1].strip().strip('"')
              for line in pyproject.splitlines()
              if line.startswith("name = ")
          )
          expected = next(
              line.split("=", 1)[1].strip().strip('"')
              for line in pyproject.splitlines()
              if line.startswith("version = ")
          )
          attempts = 24
          delay_seconds = 15

          print(f"Expecting PyPI version: {project_name}=={expected}")

          for attempt in range(1, attempts + 1):
              url = f"https://pypi.org/pypi/{project_name}/json?attempt={attempt}&ts={int(time.time())}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "Cache-Control": "no-cache",
                      "Pragma": "no-cache",
                  },
              )
              version = ""
              error = ""
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      payload = json.load(response)
                  version = payload.get("info", {}).get("version", "") or ""
              except urllib.error.HTTPError as exc:
                  error = f"HTTP {exc.code}"
              except Exception as exc:  # pragma: no cover - workflow diagnostics
                  error = f"{type(exc).__name__}: {exc}"

              if version == expected:
                  print(f"PyPI now reports {project_name}=={expected}")
                  raise SystemExit(0)

              detail = version or "<missing>"
              if error:
                  detail = f"{detail} ({error})"
              print(f"Attempt {attempt}/{attempts}: PyPI reports '{detail}'")
              time.sleep(delay_seconds)

          print(f"PyPI never reported {project_name}=={expected} after publish.")
          raise SystemExit(1)
          PY
      - name: Create or update GitHub Release after PyPI publish succeeds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 \
            && gh release edit "$TAG_NAME" --latest \
            || gh release create "$TAG_NAME" --generate-notes
