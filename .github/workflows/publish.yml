name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version consistency
        run: |
          python - <<'PY'
          import pathlib, re, sys
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          init_py = pathlib.Path("controlmesh/__init__.py").read_text(encoding="utf-8")
          project_match = re.search(r'^version = "([^"]+)"', pyproject, re.MULTILINE)
          init_match = re.search(r'^__version__ = "([^"]+)"', init_py, re.MULTILINE)
          if not project_match or not init_match:
              raise SystemExit("Failed to read version from pyproject.toml or controlmesh/__init__.py")
          project_version = project_match.group(1)
          init_version = init_match.group(1)
          if project_version != init_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={project_version} vs controlmesh/__init__.py={init_version}"
              )
          print(f"Version OK: {project_version}")
          PY
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify dist contents
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          project_version = next(
              line.split("=", 1)[1].strip().strip('"')
              for line in pyproject.splitlines()
              if line.startswith("version = ")
          )
          wheel = dist / f"controlmesh-{project_version}-py3-none-any.whl"
          sdist = dist / f"controlmesh-{project_version}.tar.gz"

          if not wheel.exists() or not sdist.exists():
              raise SystemExit(f"Missing expected dist files: wheel={wheel.exists()} sdist={sdist.exists()}")

          with zipfile.ZipFile(wheel) as zf:
              wheel_hits = [name for name in zf.namelist() if name.startswith("controlmesh_runtime/")]
          with tarfile.open(sdist) as tf:
              sdist_hits = [name for name in tf.getnames() if "controlmesh_runtime/" in name]

          if not wheel_hits or not sdist_hits:
              raise SystemExit(
                  "Built distributions are missing controlmesh_runtime. "
                  f"wheel_hits={len(wheel_hits)} sdist_hits={len(sdist_hits)}"
              )

          print(
              "Dist contents verified: "
              f"wheel_hits={len(wheel_hits)} sdist_hits={len(sdist_hits)}"
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify-pypi:
    name: Verify PyPI visibility
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for PyPI JSON to show the tagged version
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import time
          import urllib.error
          import urllib.request

          expected = os.environ["EXPECTED_VERSION"].removeprefix("v")
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          project_name = next(
              line.split("=", 1)[1].strip().strip('"')
              for line in pyproject.splitlines()
              if line.startswith("name = ")
          )
          attempts = 24
          delay_seconds = 15

          print(f"Expecting PyPI version: {project_name}=={expected}")

          for attempt in range(1, attempts + 1):
              url = f"https://pypi.org/pypi/{project_name}/json?attempt={attempt}&ts={int(time.time())}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/json",
                      "Cache-Control": "no-cache",
                      "Pragma": "no-cache",
                  },
              )
              version = ""
              error = ""
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      payload = json.load(response)
                  version = payload.get("info", {}).get("version", "") or ""
              except urllib.error.HTTPError as exc:
                  error = f"HTTP {exc.code}"
              except Exception as exc:  # pragma: no cover - workflow diagnostics
                  error = f"{type(exc).__name__}: {exc}"

              if version == expected:
                  print(f"PyPI now reports {project_name}=={expected}")
                  raise SystemExit(0)

              detail = version or "<missing>"
              if error:
                  detail = f"{detail} ({error})"
              print(f"Attempt {attempt}/{attempts}: PyPI reports '{detail}'")
              time.sleep(delay_seconds)

          print(f"PyPI never reported {project_name}=={expected} after publish.")
          raise SystemExit(1)
          PY
