name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  UV_VERSION: "0.11.7"
  BUN_VERSION: "1.3.11"

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Toolchain doctor
        run: python scripts/doctor_toolchain.py --strict --require-bun
      - name: Install dependencies
        run: |
          uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy controlmesh tests

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Toolchain doctor
        run: python scripts/doctor_toolchain.py --strict --require-bun
      - name: Install dependencies
        run: |
          uv sync --all-extras --dev
      - name: Run test suite
        run: uv run pytest -q

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Toolchain doctor
        run: python scripts/doctor_toolchain.py --strict --require-bun
      - name: Install build tooling
        run: |
          uv sync --all-extras --dev
      - name: Build distribution
        run: uv build
