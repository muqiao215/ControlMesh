<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">ControlMesh runtime and Feishu native/bridge modes</title>
  <desc id="desc">A product architecture diagram showing chat transports feeding ControlMesh Runtime, official coding CLIs as execution engines, and two Feishu paths: native and bridge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f4ec"/>
      <stop offset="0.48" stop-color="#eef5ef"/>
      <stop offset="1" stop-color="#e9f0f6"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#113f4a"/>
      <stop offset="1" stop-color="#1f6f63"/>
    </linearGradient>
    <linearGradient id="native" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d5d7a"/>
      <stop offset="1" stop-color="#2e8f6f"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b4a1f"/>
      <stop offset="1" stop-color="#b26a2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12313a" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { font: 700 20px Georgia, "Times New Roman", serif; fill: #18343c; }
      .small { font: 500 15px Georgia, "Times New Roman", serif; fill: #48636a; }
      .tiny { font: 500 13px Georgia, "Times New Roman", serif; fill: #5b7076; }
      .white-label { font: 700 22px Georgia, "Times New Roman", serif; fill: #ffffff; }
      .white-small { font: 500 15px Georgia, "Times New Roman", serif; fill: #dcefed; }
      .chip { font: 700 13px Georgia, "Times New Roman", serif; letter-spacing: 0.04em; fill: #234047; }
      .line { stroke: #31545d; stroke-width: 3; stroke-linecap: round; fill: none; opacity: 0.7; }
      .dash { stroke-dasharray: 8 9; }
    </style>
  </defs>

  <rect width="1120" height="640" rx="34" fill="url(#bg)"/>
  <circle cx="972" cy="94" r="118" fill="#c7e0d7" opacity="0.45"/>
  <circle cx="128" cy="544" r="136" fill="#f0c996" opacity="0.34"/>
  <path d="M64 154 C230 58, 382 78, 514 166 C655 260, 812 244, 1058 132" stroke="#d6c3a2" stroke-width="2" opacity="0.45" fill="none"/>

  <text x="60" y="68" class="label" style="font-size:31px">ControlMesh Runtime</text>
  <text x="60" y="97" class="small">Official coding CLIs, chat transports, background work, and controlled write-back.</text>

  <g filter="url(#shadow)">
    <rect x="432" y="166" width="256" height="176" rx="28" fill="url(#runtime)"/>
    <text x="560" y="219" text-anchor="middle" class="white-label">Runtime Spine</text>
    <text x="560" y="252" text-anchor="middle" class="white-small">sessions</text>
    <text x="560" y="279" text-anchor="middle" class="white-small">background tasks</text>
    <text x="560" y="306" text-anchor="middle" class="white-small">evidence + summaries</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="160" width="244" height="154" rx="24" fill="#ffffff" opacity="0.94"/>
    <text x="186" y="203" text-anchor="middle" class="label">Chat Ingress</text>
    <text x="186" y="237" text-anchor="middle" class="small">Telegram</text>
    <text x="186" y="263" text-anchor="middle" class="small">Matrix</text>
    <text x="186" y="289" text-anchor="middle" class="small">Feishu</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="160" width="244" height="154" rx="24" fill="#ffffff" opacity="0.94"/>
    <text x="934" y="203" text-anchor="middle" class="label">Execution</text>
    <text x="934" y="237" text-anchor="middle" class="small">Claude CLI</text>
    <text x="934" y="263" text-anchor="middle" class="small">Codex CLI</text>
    <text x="934" y="289" text-anchor="middle" class="small">Gemini CLI</text>
  </g>

  <path class="line" d="M308 237 H420"/>
  <path class="line" d="M700 237 H812"/>
  <path class="line dash" d="M560 342 V398"/>

  <g filter="url(#shadow)">
    <rect x="76" y="418" width="438" height="150" rx="26" fill="url(#native)"/>
    <text x="296" y="461" text-anchor="middle" class="white-label">Feishu native</text>
    <text x="296" y="493" text-anchor="middle" class="white-small">scan-create app/bot onboarding</text>
    <text x="296" y="520" text-anchor="middle" class="white-small">CardKit true streaming cards</text>
    <text x="296" y="547" text-anchor="middle" class="white-small">auth-kit permission orchestration</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="606" y="418" width="438" height="150" rx="26" fill="url(#bridge)"/>
    <text x="826" y="461" text-anchor="middle" class="white-label">Feishu bridge</text>
    <text x="826" y="493" text-anchor="middle" class="white-small">reuse existing app_id / app_secret</text>
    <text x="826" y="520" text-anchor="middle" class="white-small">text or single-card preview</text>
    <text x="826" y="547" text-anchor="middle" class="white-small">small compatibility surface</text>
  </g>

  <path class="line" d="M496 398 C436 385, 360 386, 296 418"/>
  <path class="line" d="M624 398 C692 385, 760 386, 826 418"/>

  <g>
    <rect x="70" y="590" width="182" height="30" rx="15" fill="#ffffff" opacity="0.72"/>
    <text x="161" y="611" text-anchor="middle" class="chip">native = Feishu-first</text>
    <rect x="270" y="590" width="188" height="30" rx="15" fill="#ffffff" opacity="0.72"/>
    <text x="364" y="611" text-anchor="middle" class="chip">bridge = compatibility</text>
    <rect x="476" y="590" width="268" height="30" rx="15" fill="#ffffff" opacity="0.72"/>
    <text x="610" y="611" text-anchor="middle" class="chip">card_stream requires native</text>
  </g>
</svg>
